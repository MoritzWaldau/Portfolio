<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Ein unerwarteter Fehler ist aufgetreten.
        <a href="." class="reload">Neu laden</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Scrollt zur Sektion mit der angegebenen Id; wartet kurz, falls die Seite noch rendert.
        window.scrollToFragment = function (id, attempt) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            } else if ((attempt ?? 0) < 10) {
                setTimeout(() => window.scrollToFragment(id, (attempt ?? 0) + 1), 100);
            }
        };
        // Für die Sprach-Erkennung beim ersten Start (siehe MainLayout.razor).
        window.getBrowserLanguage = function () {
            return navigator.language || 'de';
        };
        // Fokussiert ein Element per Blazor-JS-Interop (z.B. das Suchfeld der Command-Palette).
        window.focusElement = function (el) {
            el?.focus();
        };
    </script>
    <script src="js/site.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
