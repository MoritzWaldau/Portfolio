name: Take site offline

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  offline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Create offline page
        run: |
          mkdir -p dist
          touch dist/.nojekyll
          cat > dist/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="de">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <meta name="robots" content="noindex, nofollow" />
            <title>Moritz Waldau – Wartung</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

              body {
                min-height: 100svh;
                display: grid;
                place-items: center;
                background: #0a1628;
                background-image:
                  radial-gradient(ellipse 60% 50% at 20% 30%, rgba(30,80,160,0.35) 0%, transparent 70%),
                  radial-gradient(ellipse 50% 40% at 80% 70%, rgba(10,50,120,0.25) 0%, transparent 70%);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                color: #e8eef8;
              }

              .card {
                text-align: center;
                padding: 3rem 2.5rem;
                max-width: 440px;
                width: 90%;
                background: rgba(255,255,255,0.06);
                border: 1px solid rgba(255,255,255,0.12);
                border-radius: 20px;
                backdrop-filter: blur(16px) saturate(160%);
                -webkit-backdrop-filter: blur(16px) saturate(160%);
                box-shadow: 0 8px 40px rgba(0,0,0,0.4);
              }

              .icon {
                font-size: 3rem;
                margin-bottom: 1.25rem;
                display: block;
                opacity: 0.85;
              }

              h1 {
                font-size: 1.5rem;
                font-weight: 600;
                letter-spacing: 0.01em;
                margin-bottom: 0.75rem;
              }

              p {
                font-size: 1rem;
                color: rgba(232,238,248,0.7);
                line-height: 1.6;
              }

              .name {
                margin-top: 2rem;
                font-size: 0.8rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: rgba(255,255,255,0.35);
              }
            </style>
          </head>
          <body>
            <div class="card">
              <span class="icon">🛠️</span>
              <h1>Seite vorübergehend offline</h1>
              <p>Die Seite wird gerade gewartet und ist in Kürze wieder erreichbar.</p>
              <p class="name">Moritz Waldau</p>
            </div>
          </body>
          </html>
          HTMLEOF
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy offline page
        id: deployment
        uses: actions/deploy-pages@v4
