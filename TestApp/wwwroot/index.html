<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Moritz Waldau – IT-Consultant für Systemarchitektur und Full-Stack-Entwicklung mit .NET, Azure und Microservices. Open-Source-Projekte (OrderSphere, EmployeeManagementSystem), Skills und Werdegang." />
    <meta name="theme-color" content="#070d19" />
    <title>Moritz Waldau – Portfolio</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TestApp.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Ein unerwarteter Fehler ist aufgetreten.
        <a href="." class="reload">Neu laden</a>
        <span class="dismiss">🗙</span>
    </div>
    <script>
        // Scrollt zur Sektion mit der angegebenen Id; wartet kurz, falls die Seite noch rendert.
        window.scrollToFragment = function (id, attempt) {
            const el = document.getElementById(id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            } else if ((attempt ?? 0) < 10) {
                setTimeout(() => window.scrollToFragment(id, (attempt ?? 0) + 1), 100);
            }
        };
    </script>
    <script src="js/site.js"></script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
