name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set base href for GitHub Pages
        run: |
          sed -i 's|<base href="/" />|<base href="/Portfolio/" />|g' TestApp/wwwroot/index.html

      - name: Publish
        run: dotnet publish TestApp/TestApp.csproj -c Release -o publish

      - name: Fix SPA routing (404 → index fallback)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll processing
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
